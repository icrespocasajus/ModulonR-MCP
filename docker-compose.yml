services:
  modulonr-mcp-server-container:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2030:2030"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../workspace:/home
      - tmp:/app/tmp
    environment:
      - AGORA_CONTAINER_NAME=agora_2025_v3
      - AGORA_CONTAINER_IMAGE=ghcr.io/icrespocasajus/agora_2025_v3:latest
    restart: unless-stopped
    depends_on:
      - agora-container

  agora-container:
    image: ghcr.io/icrespocasajus/agora_2025_v3:latest
    pull_policy: missing
    container_name: agora_2025_v3
    working_dir: /home
    volumes:
      - ../workspace:/home
      - agora-packages:/opt/agorauser/Agora
    ports:
      - "8004:8002"
    environment:
      - AGORA_HOME=/usr/lib/Agora
      - AGORA_LIBS_USER=/opt/agorauser/Agora
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    restart: unless-stopped

volumes:
  tmp:
  agora-packages:
    driver: local
